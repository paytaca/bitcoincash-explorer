version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  zmq-listener:
    build:
      context: .
      dockerfile: Dockerfile.zmq
    environment:
      BCH_ZMQ_HOST: ${BCH_ZMQ_HOST:-127.0.0.1}
      BCH_ZMQ_PORT: ${BCH_ZMQ_PORT:-28332}
      REDIS_URL: redis://127.0.0.1:6379/0
      REDIS_PREFIX: bch
      # Fallback RPC (for initial sync)
      BCH_RPC_URL: ${BCH_RPC_URL}
      BCH_RPC_USER: ${BCH_RPC_USER}
      BCH_RPC_PASS: ${BCH_RPC_PASS}
      MAX_BLOCKS: 15
      MAX_TRANSACTIONS: 20
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    working_dir: /app
    # Host networking for ZMQ (BCHN is on host)
    network_mode: "host"
    command: ["/usr/local/bin/zmq-listener"]

  web:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: "host"
    environment:
      # Go API server
      API_HOST: "0.0.0.0"
      API_PORT: "8000"

      # BCH RPC
      BCH_RPC_URL: ${BCH_RPC_URL}
      BCH_RPC_USER: ${BCH_RPC_USER}
      BCH_RPC_PASS: ${BCH_RPC_PASS}
      
      # Fulcrum (Electrum server)
      FULCRUM_HOST: ${FULCRUM_HOST:-127.0.0.1}
      FULCRUM_PORT: ${FULCRUM_PORT:-60001}
      FULCRUM_TIMEOUT_MS: ${FULCRUM_TIMEOUT_MS:-30000}
      
      # BCMR
      BCMR_BASE_URL: ${BCMR_BASE_URL:-https://bcmr.paytaca.com}
      
      # Chain info
      PUBLIC_CHAIN: ${CHAIN:-mainnet}
      MAINNET_URL: ${MAINNET_URL}
      CHIPNET_URL: ${CHIPNET_URL}
      
      # Redis
      REDIS_URL: redis://127.0.0.1:6379/0
      REDIS_PREFIX: bch
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped
    working_dir: /app
    command: ["/usr/local/bin/api"]

volumes:
  redis-data: