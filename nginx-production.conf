# Bitcoin Cash Explorer - Nginx Configuration
# 
# This configuration prevents 504 Gateway Timeout errors by:
# 1. Increasing proxy timeouts to 75-120 seconds
# 2. Setting appropriate buffer sizes
# 3. Providing a shorter timeout for health checks
#
# To use this configuration:
# 1. Copy to /etc/nginx/sites-available/bitcoincash-explorer
# 2. Create symlink: ln -s /etc/nginx/sites-available/bitcoincash-explorer /etc/nginx/sites-enabled/
# 3. Test: nginx -t
# 4. Reload: systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name bchexplorer.info www.bchexplorer.info;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bchexplorer.info www.bchexplorer.info;

    # SSL configuration (adjust paths as needed)
    # ssl_certificate /path/to/cert.pem;
    # ssl_certificate_key /path/to/key.pem;

    # Root directory and index
    root /var/www/bitcoincash-explorer;
    index index.html;

    # === TIMEOUT CONFIGURATION (Critical for preventing 504 errors) ===
    
    # Time to establish connection with upstream
    proxy_connect_timeout 75s;
    
    # Time to send request to upstream
    proxy_send_timeout 75s;
    
    # Time to wait for upstream response (most important)
    proxy_read_timeout 120s;
    
    # Time for client to receive response
    send_timeout 120s;

    # === BUFFER CONFIGURATION ===
    
    # Buffer size for reading response headers
    proxy_buffer_size 16k;
    
    # Number and size of buffers for reading response
    proxy_buffers 8 16k;
    
    # Buffer size for busy buffers
    proxy_busy_buffers_size 32k;
    
    # Disable buffering for streaming responses
    proxy_buffering off;

    # === MAIN PROXY CONFIGURATION ===
    
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # === HEALTH CHECK (shorter timeout) ===
    
    location /api/status {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        # Short timeouts for health checks
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 10s;
    }

    # === STATIC FILES (bypass proxy) ===
    
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # === GZIP COMPRESSION ===
    
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;
}
